name: CI — test, lint, build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: waldo
          POSTGRES_PASSWORD: waldo  # pragma: allowlist secret
          POSTGRES_DB: waldo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: waldo
      POSTGRES_PASSWORD: waldo  # pragma: allowlist secret
      POSTGRES_DB: waldo
      REDIS_URL: redis://localhost:6379/0
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin  # pragma: allowlist secret
      MINIO_SECURE: "false"
      APP_ENV: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── System deps (ffmpeg/ffprobe used by lib/frame_extractor + frame_cache) ──
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      # ── MinIO (started as a step — GH Actions services can't pass `command:`) ──
      - name: Start MinIO
        env:
          MINIO_ROOT_PASSWORD: minioadmin  # pragma: allowlist secret
        run: |
          docker run -d \
            --name minio \
            --network host \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD="$MINIO_ROOT_PASSWORD" \
            minio/minio server /data
          # Wait for MinIO to be ready
          timeout 30 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done'

      # ── Python / uv ──────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies (frozen)
        run: uv sync --frozen

      # ── Ruff lint + format ───────────────────────────────────────────────────
      - name: Ruff — lint
        run: uv run ruff check .

      - name: Ruff — format check
        run: uv run ruff format --check .

      # ── Database migrations ──────────────────────────────────────────────────
      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      # ── Pytest ──────────────────────────────────────────────────────────────
      - name: Run pytest
        run: uv run pytest -v --tb=short

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci --legacy-peer-deps

      - name: Build UI (type-check + bundle)
        working-directory: ui
        run: npm run build

      - name: TypeScript strict check
        working-directory: ui
        run: npx tsc --noEmit

      # ── Secret scanning ──────────────────────────────────────────────────────
      - name: Gitleaks — secret scan
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --no-banner --redact
