services:
  # ── Infrastructure ────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: waldo
      POSTGRES_PASSWORD: waldo
      POSTGRES_DB: waldo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waldo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - waldo-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - waldo-net

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_SERVER_URL: http://localhost:9000
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - waldo-net

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set waldo http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing waldo/waldo;
      exit 0;
      "
    networks:
      - waldo-net

  # ── AI Agent (Ollama serves the LLM for the LangGraph ReAct loop) ──

  ollama:
    image: ollama/ollama:latest
    ports:
      # Expose for host debugging (curl localhost:11434/api/tags). Internal
      # traffic from waldo-app uses the docker network, not this mapping.
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Keep the model resident so the first chat doesn't pay re-load cost.
      OLLAMA_KEEP_ALIVE: "30m"
    healthcheck:
      # `ollama list` exits 0 only when the local server is reachable. The
      # ollama/ollama image doesn't ship curl/wget, so we use the bundled CLI.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - waldo-net

  # One-shot: pull the agent model on first boot so /api/v1/agent/chat works
  # the moment the app reports healthy. Idempotent — `ollama pull` is a no-op
  # when the model already exists locally.
  ollama-init:
    image: ollama/ollama:latest
    entrypoint: >
      /bin/sh -c "
        echo 'Pulling agent model: ${WALDO_AGENT_MODEL:-gemma4:e4b}…';
        OLLAMA_HOST=http://ollama:11434 ollama pull ${WALDO_AGENT_MODEL:-gemma4:e4b};
        echo 'Agent model ready.';
      "
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - waldo-net
    restart: "no"

  # ── Application (shared — no GPU needed) ──────────────────

  waldo-app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_EXTERNAL_ENDPOINT: localhost:9000
      OLLAMA_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
    networks:
      - waldo-net

  # ── Workers: Apple Silicon (CPU in Docker) ─────────────────

  waldo-labeler:
    build:
      context: .
      dockerfile: labeler/Dockerfile.apple
    profiles:
      - apple
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      DEVICE: cpu
    volumes:
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - waldo-net

  waldo-trainer:
    build:
      context: .
      dockerfile: trainer/Dockerfile.apple
    profiles:
      - apple
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      DEVICE: cpu
    volumes:
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - waldo-net

  # ── Workers: NVIDIA GPU ────────────────────────────────────

  waldo-labeler-nvidia:
    build:
      context: .
      dockerfile: labeler/Dockerfile.nvidia
    profiles:
      - nvidia
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      DEVICE: cuda
      DTYPE: bfloat16
      # Defense-in-depth: base image already sets these, but explicit beats
      # implicit if anyone ever rebases off a non-nvidia image.
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - model_cache:/root/.cache
    # PyTorch dataloaders default to shared memory for worker IPC. Docker's
    # default /dev/shm is 64MB which OOMs real workloads.
    shm_size: "4gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - waldo-net

  waldo-trainer-nvidia:
    build:
      context: .
      dockerfile: trainer/Dockerfile.nvidia
    profiles:
      - nvidia
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      DEVICE: cuda
      DTYPE: bfloat16
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - model_cache:/root/.cache
    shm_size: "4gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - waldo-net

volumes:
  pgdata:
  miniodata:
  model_cache:
  ollama_data:

networks:
  waldo-net:
    driver: bridge
