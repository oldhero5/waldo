services:
  # ── Infrastructure ────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: waldo
      POSTGRES_PASSWORD: waldo
      POSTGRES_DB: waldo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waldo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - waldo-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - waldo-net

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_SERVER_URL: http://localhost:9000
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - waldo-net

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set waldo http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing waldo/waldo;
      exit 0;
      "
    networks:
      - waldo-net

  # ── Application (shared — no GPU needed) ──────────────────

  waldo-app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_EXTERNAL_ENDPOINT: localhost:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - waldo-net

  # ── Workers: Apple Silicon (CPU in Docker) ─────────────────

  waldo-labeler:
    build:
      context: .
      dockerfile: labeler/Dockerfile.apple
    profiles:
      - apple
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      DEVICE: cpu
    volumes:
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - waldo-net

  waldo-trainer:
    build:
      context: .
      dockerfile: trainer/Dockerfile.apple
    profiles:
      - apple
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      DEVICE: cpu
    volumes:
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - waldo-net

  # ── Workers: NVIDIA GPU ────────────────────────────────────

  waldo-labeler-nvidia:
    build:
      context: .
      dockerfile: labeler/Dockerfile.nvidia
    profiles:
      - nvidia
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      DEVICE: cuda
      DTYPE: bfloat16
    volumes:
      - model_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - waldo-net

  waldo-trainer-nvidia:
    build:
      context: .
      dockerfile: trainer/Dockerfile.nvidia
    profiles:
      - nvidia
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      DEVICE: cuda
      DTYPE: bfloat16
    volumes:
      - model_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - waldo-net

volumes:
  pgdata:
  miniodata:
  model_cache:

networks:
  waldo-net:
    driver: bridge
